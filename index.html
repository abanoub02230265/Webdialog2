<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPMods Cyber ID Ultra VIP</title>
    <style>
        :root {
            --bg-dark: #030305;
            --bg-metal: #09090e;
            --neon-purple: #bd00ff;
            --neon-cyan: #00f0ff;
            --neon-red: #ff0055;
            --text-main: #ffffff;
            --text-dim: #6c6c7e;
            --font-sys: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-sys);
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        /* --- BACKGROUND MATRIX CANVAS --- */
        #matrixCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.15; pointer-events: none;
        }

        /* --- THE FLOATING 3D CYBER CARD --- */
        .card-container {
            position: relative; z-index: 10;
            width: 92%; max-width: 380px;
            aspect-ratio: 5 / 8; max-height: 85vh;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        .cyber-card {
            width: 100%; height: 100%;
            background-color: var(--bg-metal);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(213, 0, 255, 0.05), transparent),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 15px 15px, 15px 15px;
            position: relative;
            clip-path: polygon(12% 0, 100% 0, 100% 88%, 88% 100%, 0 100%, 0 12%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 240, 255, 0.05);
            animation: bootUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .cyber-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid var(--neon-purple); pointer-events: none;
            clip-path: polygon(12% 0, 100% 0, 100% 88%, 88% 100%, 0 100%, 0 12%);
            opacity: 0.4; animation: neonGlow 2s infinite ease-in-out;
        }

        /* --- GLITCH TEXT EFFECT --- */
        .glitch-text {
            position: relative;
            animation: glitch 4s infinite;
        }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-metal);
        }
        .glitch-text::before { left: 2px; text-shadow: -1px 0 var(--neon-cyan); clip: rect(44px, 450px, 56px, 0); animation: glitch-anim 5s infinite linear alternate-reverse; }
        .glitch-text::after { left: -2px; text-shadow: -1px 0 var(--neon-purple); clip: rect(85px, 450px, 140px, 0); animation: glitch-anim 2s infinite linear alternate-reverse; }

        /* --- PARTICLE SYSTEM --- */
        #particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2; overflow: hidden;
        }
        .particle {
            position: absolute; width: 2px; height: 2px;
            background: var(--neon-cyan); border-radius: 50%; opacity: 0;
            animation: floatUp infinite linear;
        }

        /* --- TICKER MARQUEE --- */
        .ticker-wrap {
            position: absolute; top: 0; left: 12%; right: 0; height: 18px;
            background: var(--neon-purple); color: #fff; overflow: hidden;
            display: flex; align-items: center; z-index: 15;
            clip-path: polygon(12px 0, 100% 0, 100% 100%, 0 100%);
            box-shadow: 0 2px 10px rgba(189, 0, 255, 0.4);
        }
        .ticker { display: flex; width: max-content; animation: marquee 10s linear infinite; }
        .ticker span { white-space: nowrap; font-size: 8px; font-weight: 900; letter-spacing: 2px; padding-right: 20px; }

        /* --- ANIMATIONS --- */
        @keyframes bootUp { 0% { opacity: 0; transform: scale(0.9) translateZ(-50px); } 100% { opacity: 1; transform: scale(1) translateZ(0); } }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinRev { 100% { transform: rotate(-360deg); } }
        @keyframes scanline { 0% { top: -5%; } 100% { top: 105%; } }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.4; } 100% { transform: translateY(-150px); opacity: 0; } }
        @keyframes neonGlow { 0%, 100% { filter: drop-shadow(0 0 2px var(--neon-purple)); opacity: 0.4; } 50% { filter: drop-shadow(0 0 8px var(--neon-purple)); opacity: 0.8; } }
        @keyframes glitch-anim { 0% { clip: rect(15px, 9999px, 66px, 0); } 100% { clip: rect(34px, 9999px, 55px, 0); } }

        /* --- CENTRAL PORTRAIT --- */
        .portrait-wrapper {
            position: absolute; top: 45px; left: 35px; right: 35px; bottom: 160px; 
            background: url('https://raw.githubusercontent.com/DPModsYT/webbydpmods/refs/heads/main/IMG_20260514_135013.jpg') center/cover no-repeat;
            border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 4px;
            z-index: 1; overflow: hidden;
            box-shadow: inset 0 0 20px #000;
        }
        .portrait-wrapper::after {
            content: ''; position: absolute; left: 0; right: 0; top: 0; height: 3px;
            background: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan);
            animation: scanline 3s infinite linear; pointer-events: none;
        }

        /* --- HARDWARE HUD --- */
        .hardware-screws { position: absolute; top: 25px; left: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); }
        .screw { width: 6px; height: 6px; border-radius: 50%; background: #222; }

        /* --- RIGHT EDGE DATA SPECS --- */
        .right-specs {
            position: absolute; right: 10px; top: 40px; display: flex; gap: 12px; writing-mode: vertical-rl; z-index: 5;
        }
        .spec-block { display: flex; flex-direction: column; gap: 2px; }
        .spec-label { color: var(--text-dim); font-size: 7px; letter-spacing: 2px; font-weight: bold; }
        .spec-value { color: var(--text-main); font-size: 9px; font-weight: bold; }
        .spec-value.cyan { color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan); }

        /* --- BOTTOM LEFT PANEL --- */
        .name-panel {
            position: absolute; bottom: 70px; left: 0; width: 58%; 
            background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(5px);
            padding: 10px 15px; border: 1px solid var(--neon-cyan); border-left: none;
            clip-path: polygon(0 0, 85% 0, 100% 30%, 100% 100%, 0 100%);
            z-index: 10;
        }
        .name-label { color: var(--text-dim); font-size: 8px; letter-spacing: 1px; }
        .name-value { color: #fff; font-size: 20px; font-weight: 900; letter-spacing: 1px; margin-bottom: 4px; text-shadow: 0 0 10px var(--neon-purple); }
        .mission-value { color: var(--neon-cyan); font-size: 10px; font-weight: bold; }

        /* --- HUD TELEGRAM BUTTON --- */
        .cyber-logo {
            position: absolute; bottom: 70px; right: 20px;
            display: flex; flex-direction: column; align-items: center; z-index: 10; cursor: pointer;
        }
        .crosshair {
            width: 46px; height: 46px; border: 1px dashed var(--neon-cyan); border-radius: 50%;
            position: relative; display: flex; justify-content: center; align-items: center;
            background: rgba(0, 240, 255, 0.02); transition: all 0.3s;
        }
        .ring-1 { position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px; border: 1px solid var(--neon-purple); border-radius: 50%; opacity: 0.5; animation: spin 5s linear infinite; }
        .tg-icon { width: 20px; height: 20px; fill: var(--neon-cyan); filter: drop-shadow(0 0 4px var(--neon-cyan)); }
        .logo-text { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--text-dim); margin-top: 4px; }

        .cyber-logo:hover .crosshair { transform: scale(1.1); border-color: var(--neon-purple); background: rgba(189, 0, 255, 0.1); }

        /* --- ACTION CONSOLE --- */
        .action-console {
            position: absolute; bottom: 15px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 20;
        }
        .meta-text { font-size: 7px; color: var(--text-dim); letter-spacing: 1px; }
        
        .init-btn {
            background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 12px 35px; font-family: var(--font-sys); font-size: 12px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; transition: all 0.2s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            box-shadow: 0 0 15px rgba(0,240,255,0.1);
        }
        .init-btn:hover { background: rgba(0, 240, 255, 0.1); box-shadow: 0 0 20px rgba(0,240,255,0.4); }
        .init-btn:active { background: var(--neon-cyan); color: #000; }

        /* SYSTEM OVERRIDE FLASH TRIGGER */
        .system-critical {
            animation: redAlert 0.3s ease infinite alternate;
        }
        @keyframes redAlert {
            0% { background-color: var(--bg-dark); }
            100% { background-color: #200008; }
        }
    </style>
</head>
<body>

<!-- MATRIX LAYER -->
<canvas id="matrixCanvas"></canvas>

<div class="card-container" id="tiltContainer">
    <div class="cyber-card" id="mainCard">
        
        <div class="ticker-wrap">
            <div class="ticker">
                <span>SYSTEM: OVERLOAD // EXCLUSIVE ACCESS GRANTED // LEVEL: GOD_MODE // DPMODS KERNEL V3 // </span>
                <span>SYSTEM: OVERLOAD // EXCLUSIVE ACCESS GRANTED // LEVEL: GOD_MODE // DPMODS KERNEL V3 // </span>
            </div>
        </div>

        <div id="particles"></div>
        <div class="portrait-wrapper"></div>

        <div class="hardware-screws">
            <div class="status-dot"></div>
            <div class="screw"></div>
        </div>

        <div class="right-specs">
            <div class="spec-block"><span class="spec-label">CORE_ID</span><span class="spec-value cyan">DP-999X</span></div>
            <div class="spec-block"><span class="spec-label">ACCESS</span><span class="spec-value">ROOT_LOCAL</span></div>
            <div class="spec-block"><span class="spec-label">STATUS</span><span class="spec-value cyan" style="color: #00ff66;">LIFETIME</span></div>
        </div>

        <div class="name-panel">
            <div class="name-label">OPERATOR</div>
            <div class="name-value glitch-text" data-text="DPMODS VIP">DPMODS VIP</div>
            <div class="mission-value">#BYPASS_SECURE_</div>
        </div>

        <div class="cyber-logo" onclick="openLink('https://t.me/dp_mods')">
            <div class="crosshair">
                <div class="ring-1"></div>
                <svg class="tg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.21-1.12-.33-1.08-.7.02-.19.27-.39.75-.6 2.93-1.28 4.88-2.12 5.86-2.53 2.77-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .24z"/></svg>
            </div>
            <div class="logo-text">BYPASS</div>
        </div>

        <div class="action-console">
            <button class="init-btn" onclick="triggerClose()">OVERRIDE SYSTEM</button>
            <div class="meta-text">⚡ INJECT MODULE V3.0 ⚡</div>
        </div>

    </div>
</div>

<script>
    // --- MATRIX DIGITAL RAIN ---
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    let columns;
    let drops = [];

    function initMatrix() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        columns = Math.floor(canvas.width / 20);
        drops = Array(columns).fill(1);
    }

    function drawMatrix() {
        ctx.fillStyle = 'rgba(3, 3, 5, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00f0ff'; 
        ctx.font = '11px monospace';
        
        for (let i = 0; i < drops.length; i++) {
            const text = String.fromCharCode(Math.floor(Math.random() * 96) + 33);
            ctx.fillText(text, i * 20, drops[i] * 20);
            if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    window.addEventListener('resize', initMatrix);
    initMatrix();
    setInterval(drawMatrix, 40);

    // --- 3D TILT EFFECT ---
    const container = document.getElementById('tiltContainer');
    document.addEventListener('mousemove', (e) => {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 15;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 15;
        container.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
    });
    
    // For Mobile Touch Support
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const xAxis = (window.innerWidth / 2 - touch.pageX) / 12;
        const yAxis = (window.innerHeight / 2 - touch.pageY) / 12;
        container.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
    });

    // --- CYBER PARTICLES ---
    function spawnParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.bottom = '15%';
            p.style.animationDuration = (Math.random() * 2 + 2) + 's';
            p.style.animationDelay = Math.random() * 2 + 's';
            if(Math.random() > 0.5) p.style.background = 'var(--neon-purple)';
            container.appendChild(p);
        }
    }
    spawnParticles();

    function openLink(url) { window.open(url, '_blank'); }

    // --- CRITICAL OVERRIDE TERMINATION ---
    function triggerClose() {
        const card = document.getElementById('mainCard');
        const btn = document.querySelector('.init-btn');
        document.body.classList.add('system-critical');
        
        btn.style.borderColor = 'var(--neon-red)';
        btn.style.backgroundColor = 'var(--neon-red)';
        btn.style.color = '#fff';
        btn.innerText = 'CRITICAL STOP...';

        card.style.transition = 'all 0.3s cubic-bezier(0.6, -0.28, 0.735, 0.045)';
        card.style.transform = 'scale(0) rotateZ(15deg)';
        card.style.opacity = '0';
        
        setTimeout(() => {
            window.location.href = "action://close";
        }, 400);
    }
</script>

</body>
</html>
