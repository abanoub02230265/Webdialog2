<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dialog Page</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0a0a;
    font-family: Arial;
}

/* الديالوج */
.dialog {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,255,255,0.3);
    width: 80%;
    max-width: 320px;
}

/* النص */
.dialog h2 {
    color: #00e5ff;
    margin-bottom: 20px;
}

/* زر الدخول */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #00e5ff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div class="dialog" id="dialog">
    <h2>مرحبا بكم</h2>
    <button onclick="closeDialog()">دخول</button>
</div>

<script>
function closeDialog() {
    // يقفل الصفحة بالكامل
    document.getElementById("dialog").style.display = "none";

    // لو داخل WebView أو تطبيق:
    if (typeof action !== "undefined") {
        action.close(); 
    }

    // fallback لو عايز يقفل النافذة في المتصفح
    setTimeout(() => {
        window.close();
    }, 200);
}
</script>

</body>
</html>
