<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Screen</title>

<style>
/* خلفية التطبيق */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* شاشة الترحيب */
#splash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, #000, #111);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* نص متحرك بألوان الطيف */
.rainbow-text {
    font-size: 40px;
    font-weight: bold;
    background: linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet,
        red
    );
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow 5s linear infinite;
}

@keyframes rainbow {
    0% { background-position: 0% }
    100% { background-position: 400% }
}

/* زر الدخول */
button {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    background: #00c6ff;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
    transform: scale(1.05);
}

/* محتوى التطبيق */
#app {
    display: none;
    padding: 20px;
}
</style>
</head>

<body>

<!-- شاشة الترحيب -->
<div id="splash">
    <div class="rainbow-text">مرحبا بكم</div>
    <button onclick="enterApp()">دخول</button>
</div>

<!-- التطبيق -->
<div id="app">
    <h1>تم الدخول إلى التطبيق ✅</h1>
    <p>هنا يبدأ محتوى التطبيق الحقيقي.</p>
</div>

<script>
function enterApp() {
    document.getElementById("splash").style.display = "none";
    document.getElementById("app").style.display = "block";
}
</script>

</body>
</html>
