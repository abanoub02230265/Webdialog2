<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini YouTube Action</title>

<style>
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: transparent; overflow: hidden;
    }

    .screen {
        position: fixed; width: 100%; height: 100%;
        background: transparent;
    }

    /* أيقونة اليوتيوب */
    .yt-icon {
        position: absolute; top: 50%; left: 20px;
        transform: translateY(-50%);
        width: 60px; height: 40px;
        background-image: url("https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg");
        background-size: contain; background-repeat: no-repeat; background-position: center;
        cursor: pointer; z-index: 10;
    }

    /* القائمة التي ستفتح (Menu) */
    .yt-menu {
        position: absolute;
        top: 3cm;          /* مسافة 3 سم من الأعلى */
        bottom: 3cm;       /* مسافة 3 سم من الأسفل */
        left: 20px;
        width: 4cm;        /* عرض 4 سم */
        background: #fff;
        border-radius: 10px;
        display: none;     /* مخفية افتراضياً */
        z-index: 20;
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
        padding: 10px;
    }
</style>
</head>

<body>

<div class="screen" id="screen">
    <div class="yt-icon" id="ytIcon"></div>
    
    <div class="yt-menu" id="ytMenu">
        <h3>YouTube</h3>
        <p>محتوى اليوتيوب هنا...</p>
    </div>
</div>

<script>
    const screen = document.getElementById("screen");
    const menu = document.getElementById("ytMenu");
    const icon = document.getElementById("ytIcon");

    // عند الضغط على أيقونة اليوتيوب
    icon.addEventListener("click", function(e){
        e.stopPropagation(); // منع إغلاق الشاشة
        menu.style.display = "block"; // إظهار القائمة
    });

    // عند الضغط في أي مكان فارغ (بما في ذلك داخل القائمة إذا أردت إغلاقها)
    screen.addEventListener("click", function(e){
        // إذا كان المستخدم ضغط على القائمة نفسها، لا تغلق (اختياري)
        if(e.target === menu || menu.contains(e.target)) return;
        
        triggerClose();
    });

    // دالة الإغلاق
    function triggerClose() {
        screen.style.transition = 'all 0.5s ease';
        screen.style.opacity = '0';
        screen.style.transform = 'scale(0.95)';
        setTimeout(() => {  
            window.location.href = "action://close";  
        }, 450);  
    }
</script>

</body>
</html>
