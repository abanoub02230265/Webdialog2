<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DPMods Control Panel</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0e14;
    color:#00e5ff;
    text-align:center;
}

h1 {
    margin-top:30px;
    text-shadow:0 0 10px #00e5ff;
}

.btn {
    display:block;
    width:80%;
    margin:15px auto;
    padding:15px;
    background:#111827;
    border:2px solid #00e5ff;
    color:#00e5ff;
    font-size:18px;
    border-radius:10px;
    text-decoration:none;
}

.btn:active {
    transform:scale(0.95);
    background:#00e5ff;
    color:#000;
}
</style>

<script>

function sendAction(action){
    window.location.href = action;
}

</script>

</head>

<body>

<h1>🔥 DPMods Control Panel</h1>

<a class="btn" href="action://close">❌ Close Dialog</a>

<a class="btn" href="https://google.com">🌐 Open Google (Test External)</a>

<a class="btn" onclick="sendAction('action://close')">⚡ JS Close Action</a>

</body>
</html>
