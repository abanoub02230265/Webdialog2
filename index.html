<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Overlay Sidebar</title>
    <style>
        /* ========================================================
           إعدادات النظام الأساسية للواجهة الجانبية (Overlay System)
           ======================================================== */
        #social-overlay-system {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* خاصية هامة جداً: تسمح للمستخدم بالضغط على التطبيق الأساسي خلف هذه الواجهة */
            pointer-events: none; 
            z-index: 99999;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* تفعيل التفاعل فقط للعناصر الخاصة بالواجهة */
        .interactive-element {
            pointer-events: auto;
        }

        /* ========================================================
           حاوية شاشة البداية (في المنتصف)
           ======================================================== */
        #center-intro {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
        }

        /* تأثير دائرة التحميل الصغرى */
        .mini-loader {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: #007AFF; /* لون أزرق عصري */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .intro-text {
            font-size: 12px;
            color: #333;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.3px;
        }

        /* زر المتابعة الصغير */
        #continue-btn {
            display: none;
            background: #000;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, background 0.2s;
            opacity: 0;
            transform: translateY(10px);
        }

        #continue-btn.show {
            display: block;
            animation: fadeInUp 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* تأثير الحركة للذهاب لليسار */
        #center-intro.move-left {
            left: 20px; /* التوجه لأقصى اليسار */
            transform: translate(0, -50%) scale(0.5); /* التصغير أثناء الحركة */
            opacity: 0; /* الاختفاء التدريجي */
        }

        /* ========================================================
           القائمة الجانبية (Sidebar)
           ======================================================== */
        #left-sidebar {
            position: absolute;
            top: 50%;
            left: 15px; /* تثبيت في الجهة اليسرى */
            transform: translateY(-50%) scale(0.5);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); /* تأثير ارتداد ناعم */
            visibility: hidden;
        }

        #left-sidebar.active {
            opacity: 1;
            transform: translateY(-50%) scale(1);
            visibility: visible;
        }

        .social-icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon-btn:hover {
            background: rgba(255, 0, 0, 0.1);
        }

        .social-icon-btn svg {
            width: 24px;
            height: 24px;
            fill: #FF0000; /* لون يوتيوب */
        }

        /* ========================================================
           النافذة الجانبية للمحتوى (Panel)
           ======================================================== */
        #social-panel {
            position: absolute;
            top: 3vh; /* ترك مسافة بسيطة من الأعلى */
            left: 80px; /* تظهر بجانب القائمة الجانبية */
            height: 94vh; /* ارتفاع أقل من الشاشة بقليل */
            width: 50vw; /* نصف الشاشة تقريباً */
            min-width: 260px;
            max-width: 400px;
            background: rgba(250, 250, 250, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            box-shadow: 15px 0 50px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transform: translateX(-30px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #social-panel.open {
            transform: translateX(0);
            opacity: 1;
            visibility: visible;
        }

        /* تصميم داخلي للنافذة (جاهز للمستقبل) */
        .panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
        }

        .panel-header h3 {
            margin: 0;
            font-size: 16px;
            color: #111;
        }

        .panel-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* مساحة فارغة منظمة كعينة للروابط المستقبلية */
        .placeholder-box {
            height: 60px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px dashed rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="social-overlay-system">
        
        <div id="center-intro" class="interactive-element">
            <div id="loading-view" style="text-align: center;">
                <div class="mini-loader"></div>
                <p class="intro-text">مواقع التواصل الاجتماعي أصبحت مدعومة</p>
            </div>
            <button id="continue-btn">متابعة</button>
        </div>

        <div id="left-sidebar" class="interactive-element">
            <button class="social-icon-btn" id="youtube-btn" title="YouTube">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M9.6,15.2V8.8L15.6,12L9.6,15.2z"/>
                </svg>
            </button>
        </div>

        <div id="social-panel" class="interactive-element">
            <div class="panel-header">
                <h3>منصات التواصل</h3>
            </div>
            <div class="panel-content">
                <div class="placeholder-box">مساحة لزر يوتيوب</div>
                <div class="placeholder-box">مساحة لزر تيليجرام</div>
                <div class="placeholder-box">مساحة لزر فيسبوك</div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // تعريف العناصر
            const loadingView = document.getElementById('loading-view');
            const continueBtn = document.getElementById('continue-btn');
            const centerIntro = document.getElementById('center-intro');
            const leftSidebar = document.getElementById('left-sidebar');
            const youtubeBtn = document.getElementById('youtube-btn');
            const socialPanel = document.getElementById('social-panel');

            // الخطوة 1 & 2: بعد ثانيتين إخفاء التحميل وإظهار الزر
            setTimeout(() => {
                loadingView.style.display = 'none';
                continueBtn.classList.add('show');
            }, 2000);

            // الخطوة 3: عند الضغط على "متابعة"
            continueBtn.addEventListener('click', () => {
                // تفعيل حركة الانتقال لليسار
                centerIntro.classList.add('move-left');
                
                // بعد انتهاء حركة المنتصف، نظهر القائمة الجانبية بسلاسة
                setTimeout(() => {
                    centerIntro.style.display = 'none'; // إخفاء الحاوية القديمة نهائياً
                    leftSidebar.classList.add('active'); // إظهار القائمة الجانبية
                }, 500); // 500ms متوافقة مع سرعة الانتقال في الـ CSS
            });

            // الخطوة 4 & 5: إظهار النافذة عند الضغط على أيقونة يوتيوب
            youtubeBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // منع انتقال الضغطة للـ document
                socialPanel.classList.toggle('open');
            });

            // الخطوة 6: الإغلاق التلقائي عند الضغط في أي مكان بالخارج
            document.addEventListener('click', (event) => {
                const isPanelOpen = socialPanel.classList.contains('open');
                const clickedInsidePanel = socialPanel.contains(event.target);
                const clickedOnSidebar = leftSidebar.contains(event.target);

                // إذا كانت النافذة مفتوحة والضغط كان خارج النافذة وخارج القائمة الجانبية
                if (isPanelOpen && !clickedInsidePanel && !clickedOnSidebar) {
                    socialPanel.classList.remove('open');
                }
            });
            
            // منع إغلاق النافذة عند النقر بداخلها
            socialPanel.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        });
    </script>
</body>
</html>
